name: Build executable binaries

on:
  push:
    tags:
      - v*.*

jobs:
  create_release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Version ${{ github.ref }}
          draft: true
          prerelease: false

  build-esptool-binaries:
    name: Build esptool binaries for ${{ matrix.os }}
    needs: create_release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
        - os: macos-latest
          TARGET: macos
        - os: ubuntu-latest
          TARGET: linux-amd64
        - os: windows-latest
          TARGET: win64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v1

      - name: Set up Python 3.8
        uses: actions/setup-python@v1
        with:
          python-version: 3.8

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install --user -e .

      - name: Build with pyinstaller
        run: |
          pyinstaller -F --icon=espressif.ico esptool.py
          pyinstaller -F --icon=espressif.ico espefuse.py
          pyinstaller -F --icon=espressif.ico espsecure.py
          pyinstaller -F --icon=espressif.ico esp_rfc2217_server.py

      - name: Package files (zip)
        if: matrix.os != 'windows-latest'
        run: |
          zip -r -j ${{ matrix.TARGET }}.zip ./dist/*
      - name: Package files (7z)
        if: matrix.os == 'windows-latest'
        run: 7z a ${{ matrix.TARGET }}.zip ./dist/*

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create_release.outputs.upload_url }}
          asset_path: "${{ matrix.TARGET }}.zip"
          asset_name: "${{ matrix.TARGET }}.zip"
          asset_content_type: application/zip

